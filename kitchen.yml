---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  channel: stable
  install_strategy: once
  chef_license: accept
  enforce_idempotency: <%= ENV['ENFORCE_IDEMPOTENCY'] || true %>
  multiple_converge: <%= ENV['MULTIPLE_CONVERGE'] || 2 %>
  deprecations_as_errors: true
  log_level: <%= ENV['CHEF_LOG_LEVEL'] || 'auto' %>

verifier:
  name: inspec

platforms:
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: opensuse-leap-15
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[test::default]
  - name: gem
    run_list:
      - recipe[test::gem]
  - name: global
    run_list:
      - recipe[test::global]
  - name: ruby_uninstall
    run_list:
      - recipe[test::ruby_uninstall]
  - name: system_install
    run_list:
      - recipe[test::system_install]
  - name: user_install
    run_list:
      - recipe[test::user_install]
  - name: custom_group_install
    run_list:
      - recipe[test::custom_group_install]
